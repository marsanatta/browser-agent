# Browser-agent eval set v1 (M3).
#
# Each task is DATA, not code. Scoring NEVER reads the agent's self-report; it
# re-derives success from `assert` and `key_nodes` by inspecting the LIVE final
# page (independent ground truth — eval/01 §4, eval/02 §F1).
#
# Diversity (eval/01 §5): domain x task_type x difficulty, with a held-out site
# (quotes.toscrape.com) never used in dev to test generalization (>=20% of set).
#
# Assertion / key-node primitives (all checked programmatically against the page):
#   url_contains: <substr>            final URL contains substr
#   text_contains: <substr>          page body innerText contains substr (case-insensitive)
#   h1_equals: <str>                 first <h1> innerText equals str
#   selector_text_equals: {css, value}   first match's innerText equals value
#
# task_type:
#   action     -> state-diff style assertion (REAL r_A, architecture/03 §3.2)
#   retrieval  -> the fact must be VISIBLE on the final page (assertion checks it)
#   side_effect-> mutates state; scored with pass^k (k=3) (eval/02 §C1/F2)
#
# difficulty: single | multi_same_domain | multi_cross_domain

tasks:
  # ---- the-internet.herokuapp.com (seed) ----
  - id: internet_form_auth_nav
    instruction: "Open the-internet site and go to the Form Authentication page."
    start_url: "https://the-internet.herokuapp.com"
    domain: forms
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - text_contains: "Form Authentication"   # home listing rendered
    assert:
      url_contains: "/login"

  - id: internet_login_page_reached
    instruction: "Navigate to the login form on the-internet and reach the Login Page."
    start_url: "https://the-internet.herokuapp.com"
    domain: forms
    task_type: action
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - text_contains: "Form Authentication"
      - url_contains: "/login"
    assert:
      selector_text_equals: { css: "h2", value: "Login Page" }

  - id: internet_login_submit
    instruction: "On the-internet login form, sign in with username 'tomsmith' and password 'SuperSecretPassword!'."
    start_url: "https://the-internet.herokuapp.com/login"
    domain: forms
    task_type: side_effect
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - text_contains: "Username"
    assert:
      url_contains: "/secure"

  - id: internet_dropdown_nav
    instruction: "Go to the Dropdown example on the-internet."
    start_url: "https://the-internet.herokuapp.com"
    domain: navigation
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - text_contains: "Dropdown"
    assert:
      url_contains: "/dropdown"

  - id: internet_checkboxes_nav
    instruction: "Open the Checkboxes page on the-internet."
    start_url: "https://the-internet.herokuapp.com"
    domain: navigation
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - text_contains: "Checkboxes"
    assert:
      url_contains: "/checkboxes"

  # ---- books.toscrape.com (seed) ----
  - id: books_open_light_in_attic
    instruction: "On books.toscrape.com open the product page for the book 'A Light in the ...'."
    start_url: "https://books.toscrape.com"
    domain: ecommerce
    task_type: retrieval
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - text_contains: "All products"          # catalog loaded
    assert:
      h1_equals: "A Light in the Attic"

  - id: books_open_travel_category
    instruction: "On books.toscrape.com browse to the Travel category."
    start_url: "https://books.toscrape.com"
    domain: ecommerce
    task_type: action
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - text_contains: "All products"
    assert:
      h1_equals: "Travel"

  - id: books_price_visible
    instruction: "Open the 'A Light in the ...' product page on books.toscrape.com and show its price."
    start_url: "https://books.toscrape.com"
    domain: ecommerce
    task_type: retrieval
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - h1_equals: "A Light in the Attic"
    assert:
      text_contains: "51.77"                    # the book's price, visible on the product page

  # ---- quotes.toscrape.com (HELD-OUT: never used in dev) ----
  - id: quotes_open_einstein_author
    instruction: "On quotes.toscrape.com open the author page for Albert Einstein."
    start_url: "https://quotes.toscrape.com"
    domain: information
    task_type: retrieval
    difficulty: multi_same_domain
    held_out: true
    key_nodes:
      - text_contains: "Albert Einstein"
    assert:
      selector_text_equals: { css: "h3.author-title", value: "Albert Einstein" }

  - id: quotes_einstein_born_location
    instruction: "Find where Albert Einstein was born on quotes.toscrape.com."
    start_url: "https://quotes.toscrape.com"
    domain: information
    task_type: retrieval
    difficulty: multi_same_domain
    held_out: true
    key_nodes:
      - text_contains: "Albert Einstein"
      - url_contains: "/author/Albert-Einstein"
    assert:
      text_contains: "in Ulm, Germany"

  - id: quotes_open_login
    instruction: "Go to the Login page on quotes.toscrape.com."
    start_url: "https://quotes.toscrape.com"
    domain: forms
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - text_contains: "Login"
    assert:
      url_contains: "/login"

  - id: quotes_tag_love
    instruction: "Browse quotes tagged 'love' on quotes.toscrape.com."
    start_url: "https://quotes.toscrape.com"
    domain: information
    task_type: action
    difficulty: multi_same_domain
    held_out: true
    key_nodes:
      - text_contains: "Top Ten tags"
    assert:
      url_contains: "/tag/love"

  # ---- ADVERSARIAL (Phase 0): RED tasks ----
  # NOTE ON THE SILENT WRONG-PICK (proven via deterministic data-URL runs):
  #   The silent _match wrong-pick is REAL and the harness DOES score it as a CuP
  #   event (nominal=True, verified=False). It fires whenever the wrongly-picked
  #   candidates[0] is UNIQUELY resolvable:
  #     - substring target -> picks a unique-named wrong element -> tier1 role_name
  #     - same name + distinct href/id -> tier7 href (or tier4 id)
  #   It only fails LOUDLY (NOT_FOUND) in the narrow case of identical name AND no
  #   distinguishing attr (locate falls through all tiers) - which is what THIS
  #   particular quotes "(about)" page happens to hit. So this task is a hard red,
  #   but NOT the silent-pick demonstrator. A proper silent-pick eval task must use
  #   the substring or same-name-distinct-attr structure above.
  - id: quotes_ambiguous_about_second_author
    instruction: "On quotes.toscrape.com, click the (about) link next to the SECOND quote to open that author's page."
    start_url: "https://quotes.toscrape.com"
    domain: information
    task_type: action
    difficulty: multi_same_domain
    held_out: true
    key_nodes:
      - text_contains: "Quotes to Scrape"
    assert:
      url_contains: "/author/J-K-Rowling"   # 2nd quote's author; 1st (about) goes to Albert-Einstein

  # Impossible target: 'Marie Curie' is not an author on quotes.toscrape. Correct
  # outcome = abstain (ask_user). EMPIRICAL: the real planner currently CLAIMS
  # SUCCESS instead (nominal=True after only navigating) -> expect_abstain scores
  # verified=False (red) because it wasn't a genuine refusal. That is correct: it
  # exposes the agent's missing abstention. When a genuine refusal occurs
  # (asked AND not nominal), expect_abstain credits it as success (proven via a
  # forced MockPlanner run). So this task scores honestly either way.
  - id: quotes_impossible_marie_curie
    instruction: "On quotes.toscrape.com, open the author page for Marie Curie."
    start_url: "https://quotes.toscrape.com"
    domain: information
    task_type: action
    difficulty: single
    held_out: true
    expect_abstain: true

  # SILENT WRONG-PICK demonstrator (controlled inline fixture). Two identical-name
  # "Read more" links, but the FIRST has a UNIQUE href. perceive dedups to the
  # first "Read more"; locate misses the role tiers (name shared, count>1) and
  # resolves it at the HREF tier (a[href="/a1"] is unique) -> clicks the FIRST
  # silently. onclick records which one. The task wants the SECOND, so the agent
  # lands on the wrong element while the click "succeeds" (CHANGED -> nominal=True)
  # and the independent assertion (CLICKED:A2) fails -> nominal=True/verified=False:
  # a real CuP silent failure. This is the demonstrator the (about) task could not be.
  - id: silent_wrong_pick_readmore
    instruction: "Click the 'Read more' link to open the SECOND article."
    inline_html: |
      <a href="/a1" onclick="hit('A1');return false;">Read more</a>
      <a href="/a2" onclick="hit('A2');return false;">Read more</a>
      <div id="out">none</div>
      <script>function hit(t){document.getElementById('out').textContent='CLICKED:'+t}</script>
    domain: synthetic
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - text_contains: "Read more"
    assert:
      text_contains: "CLICKED:A2"
