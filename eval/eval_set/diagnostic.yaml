# CONTROLLED DIAGNOSTIC SET (#0, LLM_LOOP_IMPROVEMENT_PLAN §0/§16).
# A before/after PROBE for strategy-adaptation (#1/#2/#3) + trustability (#4a).
# Local static inline_html (deterministic, no live site). Run ONLY by the diagnostic
# runner (eval/passk_diag.py) — NOT by eval.harness, so it never enters the sandbox
# headline and is NEVER an evolve target (evolve target stays live dev-39). ~1/3 sealed
# (run once at the very end). Perturbation is an objective class (rename label /
# hide-in-menu), not picked to flatter a weakness.
tasks:
  # --- slice: selector-perturbation (control vs perturbed; tier-1 role_name breaks) ---
  - id: diag_perturb_search_control
    instruction: "Click the Search button to run the search."
    inline_html: |
      <button id="b" aria-label="Search">Search</button>
      <p id="r"></p>
      <script>document.getElementById('b').addEventListener('click',function(){document.getElementById('r').textContent='SEARCH_DONE'})</script>
    domain: search
    task_type: action
    difficulty: single
    split: dev
    purpose: selector_perturb_control
    assert: { text_contains: "SEARCH_DONE" }

  - id: diag_perturb_search_renamed
    instruction: "Click the Search button to run the search."
    inline_html: |
      <button id="b" aria-label="Go">find</button>
      <p id="r"></p>
      <script>document.getElementById('b').addEventListener('click',function(){document.getElementById('r').textContent='SEARCH_DONE'})</script>
    domain: search
    task_type: action
    difficulty: single
    split: dev
    purpose: selector_perturb_renamed
    assert: { text_contains: "SEARCH_DONE" }

  - id: diag_perturb_nav_control
    instruction: "Open the Products page."
    inline_html: |
      <a id="p" href="#">Products</a>
      <p id="r"></p>
      <script>document.getElementById('p').addEventListener('click',function(e){e.preventDefault();document.getElementById('r').textContent='PRODUCTS_OPEN'})</script>
    domain: nav
    task_type: action
    difficulty: single
    split: dev
    purpose: selector_perturb_control
    assert: { text_contains: "PRODUCTS_OPEN" }

  - id: diag_perturb_nav_hidden_menu
    instruction: "Open the Products page."
    inline_html: |
      <button id="m" aria-label="Menu">menu</button>
      <nav id="n" style="display:none"><a id="p" href="#">Products</a></nav>
      <p id="r"></p>
      <script>document.getElementById('m').addEventListener('click',function(){document.getElementById('n').style.display='block'});document.getElementById('p').addEventListener('click',function(e){e.preventDefault();document.getElementById('r').textContent='PRODUCTS_OPEN'})</script>
    domain: nav
    task_type: action
    difficulty: single
    split: dev
    purpose: selector_perturb_hidden_menu
    assert: { text_contains: "PRODUCTS_OPEN" }

  # --- slice: decoy / wrong-page (body mentions target; goal = open the real item) ---
  - id: diag_decoy_results_not_product
    instruction: "Open the product page for the item whose title contains 'light'."
    inline_html: |
      <h1>Search results</h1>
      <p>Showing: A Light in the Attic, Bright Lights</p>
      <a id="p" href="#">A Light in the Attic</a>
      <p id="o"></p>
      <script>document.getElementById('p').addEventListener('click',function(e){e.preventDefault();document.getElementById('o').textContent='PRODUCT_OPENED'})</script>
    domain: ecommerce
    task_type: action
    difficulty: single
    split: dev
    purpose: intent_drift_decoy
    assert: { text_contains: "PRODUCT_OPENED" }

  # --- slice: stagnation (dead control / impossible -> must abstain within budget) ---
  - id: diag_stagnation_dead_button
    instruction: "Click the Continue button to proceed to checkout."
    inline_html: |
      <button id="b">Continue</button>
      <p>Clicking does nothing on this page.</p>
    domain: synthetic
    task_type: action
    difficulty: single
    split: dev
    purpose: stagnation_dead
    expect_abstain: true
    abstain_reason: impossible

  - id: diag_stagnation_impossible
    instruction: "Open the Settings page."
    inline_html: |
      <h1>Home</h1><p>There is no settings page on this site.</p>
    domain: synthetic
    task_type: action
    difficulty: single
    split: dev
    purpose: stagnation_impossible
    expect_abstain: true
    abstain_reason: impossible

  # --- slice: synonym (instruction term != element label) ---
  - id: diag_synonym_signin_login
    instruction: "Click the Sign in button."
    inline_html: |
      <button id="b" aria-label="Log in">Log in</button>
      <p id="r"></p>
      <script>document.getElementById('b').addEventListener('click',function(){document.getElementById('r').textContent='LOGGED_IN'})</script>
    domain: auth
    task_type: action
    difficulty: single
    split: dev
    purpose: synonym_locate
    assert: { text_contains: "LOGGED_IN" }

  # --- sealed variants (once-only; never in the keep loop) ---
  - id: diag_perturb_search_renamed_sealed
    instruction: "Click the Search button to run the search."
    inline_html: |
      <button id="b" aria-label="Submit query">find</button>
      <p id="r"></p>
      <script>document.getElementById('b').addEventListener('click',function(){document.getElementById('r').textContent='SEARCH_DONE'})</script>
    domain: search
    task_type: action
    difficulty: single
    split: sealed
    purpose: selector_perturb_renamed
    assert: { text_contains: "SEARCH_DONE" }

  - id: diag_perturb_nav_hidden_menu_sealed
    instruction: "Open the Account page."
    inline_html: |
      <button id="m" aria-label="More">more</button>
      <nav id="n" style="display:none"><a id="p" href="#">Account</a></nav>
      <p id="r"></p>
      <script>document.getElementById('m').addEventListener('click',function(){document.getElementById('n').style.display='block'});document.getElementById('p').addEventListener('click',function(e){e.preventDefault();document.getElementById('r').textContent='ACCOUNT_OPEN'})</script>
    domain: nav
    task_type: action
    difficulty: single
    split: sealed
    purpose: selector_perturb_hidden_menu
    assert: { text_contains: "ACCOUNT_OPEN" }

  - id: diag_decoy_results_not_product_sealed
    instruction: "Open the product page for the item whose title contains 'green'."
    inline_html: |
      <h1>Search results</h1>
      <p>Showing: The Green Mile, Evergreen Notes</p>
      <a id="p" href="#">The Green Mile</a>
      <p id="o"></p>
      <script>document.getElementById('p').addEventListener('click',function(e){e.preventDefault();document.getElementById('o').textContent='PRODUCT_OPENED'})</script>
    domain: ecommerce
    task_type: action
    difficulty: single
    split: sealed
    purpose: intent_drift_decoy
    assert: { text_contains: "PRODUCT_OPENED" }

  - id: diag_synonym_submit_go_sealed
    instruction: "Submit the form."
    inline_html: |
      <form><input aria-label="Name"/><button id="b" aria-label="Go">Go</button></form>
      <p id="r"></p>
      <script>document.getElementById('b').addEventListener('click',function(e){e.preventDefault();document.getElementById('r').textContent='SUBMITTED'})</script>
    domain: forms
    task_type: action
    difficulty: single
    split: sealed
    purpose: synonym_locate
    assert: { text_contains: "SUBMITTED" }
