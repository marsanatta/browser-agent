# Live real-world eval tier — REAL public sites, diverse domains + task types.
#
# This tier is deliberately SEPARATE from eval_set/tasks.yaml and is NOT part of
# the 93 offline pytest CI gate: it hits real public sites (flaky, and they
# change) and needs Copilot. Run it ON DEMAND and report results to eval/REPORT.md:
#     GH_TOKEN=$(gh auth token) PYTHONPATH=backend python -m eval.run_live_tier
#
# Every assertion is a PAGE-SPECIFIC independent check (URL / first-h1 / scoped
# selector) — never a loose `text_contains`, which false-passed the books-price
# task off the catalog grid. Same schema + same harness as the sandbox set.

tasks:
  # Information retrieval on Wikipedia — find a specific article (its atomic number
  # lives on that page). Independent check: the article's first <h1>.
  - id: live_wikipedia_helium_retrieval
    instruction: "On Wikipedia, find and open the article about the chemical element Helium to read its atomic number."
    start_url: "https://en.wikipedia.org/wiki/Main_Page"
    domain: information
    task_type: retrieval
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - url_contains: "wikipedia.org"
    assert:
      h1_equals: "Helium"

  # Multi-step navigation on a real documentation site — walk a few menu levels.
  # Independent check: the json module page URL.
  - id: live_pydocs_json_nav
    instruction: "On docs.python.org, open The Python Standard Library, then open the documentation page for the json module."
    start_url: "https://docs.python.org/3/"
    domain: documentation
    task_type: action
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - url_contains: "docs.python.org"
    assert:
      url_contains: "library/json"

  # Bot-wall demonstrator (the day-3 Google case). Google serves an anti-bot /sorry/
  # CAPTCHA to headless automation; the press/Enter DOES submit (its /sorry/ `continue=`
  # URL is /search?q=steam) but it never reaches results. With interstitial detection
  # (verify.detect_block) the agent must NOT claim success — it abstains and routes
  # blocked-unsupported (route, don't evade). So the CORRECT outcome is an honest
  # abstain: expect_abstain scores `asked AND not nominal`. The press/submit action
  # itself is proven by tests/...::test_press_action_submits_form and by
  # live_wikipedia_search_submit below (a site that does not bot-block).
  - id: live_google_search_steam
    instruction: "On google.com, search for steam and submit the search."
    start_url: "https://www.google.com"
    domain: search
    task_type: action
    difficulty: single
    held_out: false
    expect_abstain: true
    abstain_reason: blocked

  # Synonym / label mismatch on a REAL site: instruction says "Sign In" but the
  # element is labelled "Log in" -> zero-candidate _match -> L2 picks it on a real,
  # content-heavy page. Verified by reaching the login page URL (no credentials).
  - id: live_wikipedia_signin_synonym
    instruction: "On Wikipedia, click the Sign In link to go to the login page."
    start_url: "https://en.wikipedia.org/wiki/Main_Page"
    domain: information
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - url_contains: "wikipedia.org"
    assert:
      url_contains: "UserLogin"

  # Search-submit on a non-bot-blocking real site — proves fill + press Enter actually
  # submits and reaches the result. (DuckDuckGo HTML's search box has no accessible
  # name and Bing's autocomplete intercepts the submit, both probed-and-failed
  # headless, so Wikipedia's nameable search box is the reliable proof.)
  - id: live_wikipedia_search_submit
    instruction: "On Wikipedia, type 'Oxygen' in the search box and press Enter to open the article."
    start_url: "https://en.wikipedia.org/wiki/Main_Page"
    domain: information
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - url_contains: "wikipedia.org"
    assert:
      h1_equals: "Oxygen"

  # --- Widget interaction coverage (patterns the rest of the eval never touches) ---

  # Combobox / autocomplete on a real third-party site: type a prefix, then SELECT from
  # the live suggestions popup. Independent check: the chosen article's h1.
  - id: live_wikipedia_autocomplete
    instruction: "On Wikipedia, type 'Argon' into the search box and choose 'Argon' from the autocomplete suggestions that appear, to open its article."
    start_url: "https://en.wikipedia.org/wiki/Main_Page"
    domain: information
    task_type: action
    difficulty: multi_same_domain
    held_out: false
    key_nodes:
      - url_contains: "wikipedia.org"
    assert:
      h1_equals: "Argon"

  # Lazy-load: the result is rendered asynchronously after a click (not in the initial
  # DOM). Independent check: the late-rendered element's exact text.
  - id: live_internet_lazyload
    instruction: "On this Dynamic Loading page, click Start and wait for the hidden text to finish loading."
    start_url: "https://the-internet.herokuapp.com/dynamic_loading/2"
    domain: widgets
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - url_contains: "dynamic_loading"
    assert:
      selector_text_equals: { css: "#finish h4", value: "Hello World!" }

  # Modal dialog: a modal owns the page on entry; confirm the modal's OWN state.
  - id: live_internet_modal
    instruction: "Open this page where a modal window appears, and read the modal window's title."
    start_url: "https://the-internet.herokuapp.com/entry_ad"
    domain: widgets
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - url_contains: "entry_ad"
    # The title renders uppercase (CSS text-transform), and inner_text returns the
    # RENDERED text — so the exact value is the uppercased form, not the HTML source.
    assert:
      selector_text_equals: { css: ".modal-title h3", value: "THIS IS A MODAL WINDOW" }

  # Iframe: act on an element INSIDE a real iframe (the TinyMCE editor), verified by a
  # frame-aware check. The locator cascade does not pierce iframes today, so this is
  # expected to fail honestly — it documents the gap with a correct page-specific verifier.
  - id: live_internet_iframe
    instruction: "On this page, type 'browser agent was here' into the rich-text editor inside the iframe."
    start_url: "https://the-internet.herokuapp.com/iframe"
    domain: widgets
    task_type: action
    difficulty: single
    held_out: false
    key_nodes:
      - url_contains: "/iframe"
    assert:
      iframe_text_equals: { frame: "iframe#mce_0_ifr", css: "body", value: "browser agent was here" }

  # --- Breadth (autoresearch round 1, Probe B): structurally-distinct real domains,
  # one per iteration, page-specific verifier, zero text_contains, held_out. ---

  # Cross-domain navigation on the canonical reference page: example.com's only link
  # ("More information...") leaves the site for iana.org. Distinct domain (reference),
  # ultra-stable, no bot-wall. Independent check: landing on the iana.org URL.
  - id: live_example_more_info_nav
    instruction: "On example.com, click the 'More information...' link to follow it to its destination page."
    start_url: "https://example.com/"
    domain: reference
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "example.com"
    assert:
      url_contains: "iana.org"

  # News aggregator (server-rendered, automation-tolerant): click the top-nav "new"
  # link to reach the newest-submissions page. Distinct domain (news). Independent
  # check: the newest page URL.
  - id: live_hackernews_newest_nav
    instruction: "On Hacker News, click the 'new' link in the top navigation to open the newest submissions page."
    start_url: "https://news.ycombinator.com/"
    domain: news
    task_type: action
    difficulty: single
    split: dev  # news.ycombinator.com is a dev site (batch-1 added 7 dev cases here); keep the site disjoint
    key_nodes:
      - url_contains: "ycombinator.com"
    assert:
      url_contains: "newest"

  # Distinct reference/org domain with a sidebar-nav "Licenses" link. NOT a bot-wall
  # (public page); scored by the honest page-specific check (NOT expect_abstain — the
  # agent should be able to reach it). Documents a graceful-failure class: on a real
  # nav the locate cascade can miss the link and the agent ABSTAINS (asks the user)
  # rather than silently claiming success — a RED row that keeps M3 at 0.
  - id: live_gnu_licenses_nav
    instruction: "On gnu.org, click the 'Licenses' link in the navigation to open the licenses page."
    start_url: "https://www.gnu.org/"
    domain: reference
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "gnu.org"
    assert:
      url_contains: "licenses"

  # --- Breadth (autoresearch round 2, Probe B): more structurally-distinct real
  # domains across new categories (maps / news / docs / media / ...). Same rules:
  # page-specific verifier, zero text_contains, characterized live before adoption. ---

  # Maps — a slippy-map app with a persistent "Log In" nav. Distinct domain (maps).
  - id: live_osm_login_nav
    instruction: "On OpenStreetMap, click 'Log In' to open the login page."
