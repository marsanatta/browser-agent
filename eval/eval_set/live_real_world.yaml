# Live real-world eval tier — REAL public sites, CURATED BY PURPOSE.
#
# Each case carries a `purpose`: the ONE distinct capability or failure-mode it tests
# (e.g. intent_drift_decoy, modal_handling, synonym_locate, loginwall_abstain). Redundant
# same-purpose-same-site filler was removed so every case earns its place; a few cross-site
# samples per generic purpose are kept for held-out statistical power. `split` =
# dev|holdout|sealed (disjoint BY SITE). Every assertion is an INDEPENDENT page-state check
# (URL / first-h1 / scoped selector); abstain cases are scored by honest (asked AND not
# nominal). NOT part of the offline CI gate — run on demand: python -m eval.run_live_tier

tasks:
- id: live_wikipedia_helium_retrieval
  purpose: basic_retrieval
  split: dev
  instruction: On Wikipedia, find and open the article about the chemical element Helium to read its atomic number.
  start_url: https://en.wikipedia.org/wiki/Main_Page
  domain: information
  task_type: retrieval
  difficulty: multi_same_domain
  key_nodes:
  - url_contains: wikipedia.org
  assert:
    h1_equals: Helium
