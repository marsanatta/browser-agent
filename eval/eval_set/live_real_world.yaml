  # News (tech link-aggregator) — top-nav "Comments" page. Distinct domain (news).
  - id: live_lobsters_comments_nav
    instruction: "On Lobsters, open the 'Comments' page from the navigation."
    start_url: "https://lobste.rs/"
    domain: news
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "lobste.rs"
    assert:
      url_contains: "comments"

  # Docs — a large real documentation site; open its Blog. Distinct domain (docs).
  - id: live_mdn_blog_nav
    instruction: "On MDN Web Docs, open the Blog."
    start_url: "https://developer.mozilla.org/"
