    assert:
      url_contains: "blog"

  # Media / digital library — the "Log In" link sits behind a compact menu; the locate
  # cascade can miss it, so the agent ABSTAINS (honest non-completion, M3-safe). Kept
  # as a graceful-failure class on a NEW distinct domain (media). Page-specific verifier.
  - id: live_archive_login_nav
    instruction: "On the Internet Archive, click 'Log In' to open the sign-in page."
    start_url: "https://archive.org/"
    domain: media
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "archive.org"
    assert:
      url_contains: "login"

  # Government — a large, fast public-service site; open its Help page. Distinct domain (gov).
  - id: live_govuk_help_nav
    instruction: "On GOV.UK, open the 'Help' page from the site navigation."
    start_url: "https://www.gov.uk/"
    domain: government
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "gov.uk"
    assert:
      url_contains: "help"

  # Science / preprints — open arXiv's Help page (redirects to info.arxiv.org). Distinct domain (science).
  - id: live_arxiv_help_nav
    instruction: "On arXiv, open the 'Help' page."
    start_url: "https://arxiv.org/"
    domain: science
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "arxiv.org"
    assert:
      url_contains: "help"

  # Finance — open a specific equity quote page. Distinct domain (finance). NOTE: this site
  # is bot-wall-prone (consent / anti-bot interstitials that detect_block does not yet catch);
  # it VERIFIED on adoption (reached /quote/AAPL/) but a future run could serve a wall. The
  # close full-tier run is the M3 arbiter — if it silent-fails there it is discarded.
  - id: live_yahoofinance_aapl_quote
    instruction: "On Yahoo Finance, open the quote page for Apple (ticker AAPL)."
    start_url: "https://finance.yahoo.com/"
    domain: finance
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "finance.yahoo.com"
    assert:
      url_contains: "AAPL"

  # Books / digital library — open the sign-in page (distinct registrable domain from archive.org).
  - id: live_openlibrary_login_nav
    instruction: "On Open Library, click 'Log In' to open the sign-in page."
    start_url: "https://openlibrary.org/"
    domain: media
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "openlibrary.org"
    assert:
      url_contains: "login"

  # Q&A — open the Questions listing. Distinct domain (qa). On adoption the agent ABSTAINED
  # (nominal=False asked=True blocked=False, steps=4) -- a locate/navigation graceful failure
  # (NOT a detected bot-wall), so scored by the honest page-specific assert (NOT expect_abstain).
  # A RED abstain row that keeps M3 safe; close full-tier run is the arbiter.
  - id: live_stackoverflow_questions_nav
    instruction: "On Stack Overflow, open the 'Questions' page from the navigation."
    start_url: "https://stackoverflow.com/"
    domain: qa
    task_type: action
    difficulty: single
    held_out: true
    key_nodes:
      - url_contains: "stackoverflow.com"
    assert:
      url_contains: "questions"

  # --- batch 1 (dev): two-pass validated (A4 probe + independent reviewer) ---
  - id: live_internet_status_code_200
    instruction: Start on the Status Codes page and click the link for the 200 status code, then confirm the resulting page.
    start_url: https://the-internet.herokuapp.com/status_codes
    domain: navigation
    task_type: action
    difficulty: multi_same_domain
    split: dev
    key_nodes:
    - url_contains: /status_codes/200
    assert:
      text_contains: This page returned a 200 status code
  - id: live_internet_redirector_to_status
    instruction: On the Redirection page, click the 'here' link to follow the redirect to the status codes page.
    start_url: https://the-internet.herokuapp.com/redirector
    domain: navigation
    task_type: action
    difficulty: multi_same_domain
    split: dev
    key_nodes:
    - text_contains: status code
    assert:
      url_contains: /status_codes
  - id: live_internet_challenging_dom_intro
    instruction: Open the Challenging DOM page and report the static introductory description shown about finding the best locators.
    start_url: https://the-internet.herokuapp.com/challenging_dom
    domain: tables
    task_type: retrieval
    difficulty: single
    split: dev
    key_nodes:
    - url_contains: /challenging_dom
    assert:
      text_contains: The hardest part in automated web testing is finding the best locators
  - id: live_books_sapiens_price
    instruction: 'Find the book ''Sapiens: A Brief History of Humankind'' and report its price.'
    start_url: https://books.toscrape.com/
    domain: extraction
    task_type: retrieval
    difficulty: single
    split: dev
    key_nodes:
    - url_contains: sapiens-a-brief-history-of-humankind_996
