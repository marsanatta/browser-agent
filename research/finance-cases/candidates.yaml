# Autoresearch finance-cases candidate pool. Each is multi-step and tests a
# DISTINCT capability across 3 confirmed non-anti-bot sites (probed with plain
# WebFetch: stockanalysis.com, companiesmarketcap.com, screener.in).
# Validated cases get promoted into eval/eval_set/live_real_world.yaml.
tasks:
- id: live_sa_aapl_balancesheet_nav
  purpose: financial_statement_drilldown
  split: dev
  instruction: On stockanalysis.com, open Apple's stock page and then navigate to its Balance Sheet under the Financials section.
  start_url: https://stockanalysis.com/
  domain: finance
  task_type: action
  difficulty: multi_same_domain
  key_nodes:
  - url_contains: stocks/aapl
  assert:
    url_contains: financials/balance-sheet

- id: live_sa_qqq_holdings_nav
  purpose: etf_holdings_drilldown
  split: dev
  instruction: On stockanalysis.com, open the QQQ ETF page and then open its full Holdings list.
  start_url: https://stockanalysis.com/
  domain: finance
  task_type: action
  difficulty: multi_same_domain
  key_nodes:
  - url_contains: etf/qqq
  assert:
    url_contains: etf/qqq/holdings

- id: live_cmc_apple_marketcap
  purpose: ranking_list_to_detail
  split: dev
  instruction: On companiesmarketcap.com, find Apple in the largest-companies ranking and open Apple's market-cap detail page.
  start_url: https://companiesmarketcap.com/
  domain: finance
  task_type: action
  difficulty: multi_same_domain
  key_nodes:
  - text_contains: marketcap
  assert:
    url_contains: /apple/marketcap

- id: live_cmc_nvda_vs_aapl_compare
  purpose: compare_then_act
  split: dev
  instruction: On companiesmarketcap.com, determine whether NVIDIA or Apple has the larger market capitalization, then open the market-cap detail page of whichever is larger.
  start_url: https://companiesmarketcap.com/
  domain: finance
  task_type: action
  difficulty: multi_same_domain
  key_nodes:
  - text_contains: marketcap
  assert:
    url_contains: /nvidia/marketcap

- id: live_screenerin_magic_formula
  purpose: directory_to_named_item
  split: dev
  instruction: On screener.in, open the stock screens directory and open the 'Magic Formula' screen.
  start_url: https://www.screener.in/
  domain: finance
  task_type: action
  difficulty: multi_same_domain
  key_nodes:
  - url_contains: screener.in
  assert:
    url_contains: /screens/59

- id: live_screenerin_tcs_roce_deepdive
  purpose: search_to_company_metric
  split: dev
  instruction: On screener.in, search for Tata Consultancy Services (TCS), open its company page, and read its ROCE figure.
  start_url: https://www.screener.in/
  domain: finance
  task_type: retrieval
  difficulty: multi_same_domain
  key_nodes:
  - text_contains: Tata Consultancy
  assert:
    url_contains: /company/TCS
