<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="340" fill="#ffffff"/>
  <text x="40" y="40" font-size="20" font-weight="700" fill="#0f172a">Why the cost gap was 90% model, not architecture</text>
  <text x="40" y="63" font-size="13" fill="#64748b">Controlled A/B, one worktree: same eval set, harness, verifier &#8212; only executor &amp; model differ. $/80-task run.</text>

  <!-- baseline -->
  <line x1="60" y1="250" x2="690" y2="250" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- connectors -->
  <g stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3">
    <line x1="160" y1="90" x2="230" y2="90"/>
    <line x1="320" y1="184.4" x2="390" y2="184.4"/>
    <line x1="480" y1="194.8" x2="550" y2="194.8"/>
  </g>

  <!-- col 1: plan + opus  $9.39  (full) -->
  <rect x="70" y="90" width="90" height="160" rx="5" fill="#ef4444"/>
  <text x="115" y="83" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">$9.39</text>
  <text x="115" y="272" font-size="12.5" fill="#334155" text-anchor="middle">plan + opus</text>
  <text x="115" y="289" font-size="11.5" fill="#94a3b8" text-anchor="middle">verified 0.762</text>

  <!-- col 2: model swap  -$5.54  (drop 9.39 -> 3.85) -->
  <rect x="230" y="90" width="90" height="94.4" rx="5" fill="#f59e0b"/>
  <text x="275" y="83" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">&#8722;$5.54</text>
  <text x="275" y="142" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">90%</text>
  <text x="275" y="272" font-size="12.5" fill="#334155" text-anchor="middle">model swap</text>
  <text x="275" y="289" font-size="11.5" fill="#94a3b8" text-anchor="middle">opus &#8594; haiku</text>

  <!-- col 3: engine swap  -$0.61  (drop 3.85 -> 3.24) -->
  <rect x="390" y="184.4" width="90" height="10.4" rx="3" fill="#14b8a6"/>
  <text x="435" y="178" font-size="15" font-weight="700" fill="#0f766e" text-anchor="middle">&#8722;$0.61</text>
  <text x="435" y="272" font-size="12.5" fill="#334155" text-anchor="middle">engine swap</text>
  <text x="435" y="289" font-size="11.5" fill="#94a3b8" text-anchor="middle">plan &#8594; agentic (10%)</text>

  <!-- col 4: agentic + haiku  $3.24  (full, default) -->
  <rect x="550" y="194.8" width="90" height="55.2" rx="5" fill="#4f46e5"/>
  <text x="595" y="188" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">$3.24</text>
  <text x="595" y="272" font-size="12.5" font-weight="700" fill="#3730a3" text-anchor="middle">agentic + haiku</text>
  <text x="595" y="289" font-size="11.5" fill="#94a3b8" text-anchor="middle">verified 0.900 (default)</text>

  <line x1="40" y1="308" x2="680" y2="308" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="328" font-size="12.5" fill="#475569">At equal model (haiku vs haiku) the agentic engine is <tspan font-weight="700" fill="#4f46e5">~16% cheaper AND far more reliable</tspan> (1 vs 18 silent failures).</text>
</svg>
