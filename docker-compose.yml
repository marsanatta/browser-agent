services:
  app:
    build: .
    image: browser-agent
    env_file: .env
    ports:
      - "8123:8123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8123/health',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # DEFAULT: quick tunnel — NO Cloudflare account and NO token. Prints an
  # ephemeral https://<random>.trycloudflare.com URL (read it from
  # `docker compose logs cloudflared`). Verified to carry our SSE stream.
  # The URL rotates on restart and the app must keep running.
  #
  # UPGRADE to a STABLE NAMED tunnel: create a tunnel in the Cloudflare Zero
  # Trust dashboard, route it to http://app:8123, put the connector token in
  # .env as CLOUDFLARE_TUNNEL_TOKEN, and swap the command to:
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  # (the token is Cloudflare-issued — it cannot be a self-generated string).
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    command: tunnel --no-autoupdate --url http://app:8123
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
